# PostgreSQL configuration for HawAPI production

# Connection settings
max_connections = 50
superuser_reserved_connections = 3

# Memory settings
shared_buffers = 256MB
effective_cache_size = 768MB
work_mem = 8MB
maintenance_work_mem = 64MB

# Write-ahead log
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# Query tuning
random_page_cost = 1.1
effective_io_concurrency = 200

# Timeouts
statement_timeout = 30000
lock_timeout = 30000
idle_in_transaction_session_timeout = 60000
client_connection_check_interval = 60000

# Error reporting
log_timezone = 'UTC'

# Statistics
track_activities = on
track_counts = on
track_functions = none
