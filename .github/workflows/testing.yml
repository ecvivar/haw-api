name: "Node.js Unit/Integration testing"

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - '.github/**'
    branches:
      - main

jobs:
  testing:
    if: github.event.pull_request.draft == false
    name: Node.js Unit/Integration testing
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hawapi
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push database schema
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hawapi

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hawapi

      - name: Publish Test Report
        if: success() || failure()
        uses: dorny/test-reporter@v1
        with:
          name: Vitest Report
          path: test-results/**/*.xml
          reporter: java-junit
